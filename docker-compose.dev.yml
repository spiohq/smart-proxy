# Development compose file - builds from local source.
# Usage: docker compose -f docker-compose.dev.yml up --build
#
# Before first run, build the dashboard SPA:
#   make web-build

services:
  smart-proxy:
    build: .
    ports:
      - "8080:8080"   # EU region
      - "8081:8081"   # NA region
      - "8082:8082"   # FE region
      # Dashboard host-side mapping is loopback-only by default. See
      # docker-compose.yml comment and docs/DPP_COMPLIANCE.md for context.
      - "127.0.0.1:9090:9090"
    volumes:
      - dev-data:/data
    env_file:
      - deploy/example.env
    environment:
      SP_PROXY_DASHBOARD_BIND_ADDR: "0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/_sp-proxy/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  dev-data:
