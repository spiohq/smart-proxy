name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint (gofmt, go vet, gocyclo)
    needs: web-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - name: Download dashboard assets
        uses: actions/download-artifact@v5
        with:
          name: dashboard-assets
          path: internal/dashboard/static/

      - name: gofmt -s
        run: |
          files=$(gofmt -l -s .)
          if [ -n "$files" ]; then
            echo "::error::gofmt -s found unformatted files:"
            echo "$files"
            echo
            echo "Run 'gofmt -s -w .' locally to fix."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Install gocyclo
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@v0.6.0

      - name: gocyclo (fail on functions over 15)
        run: |
          out=$(gocyclo -over 15 .)
          if [ -n "$out" ]; then
            echo "::error::gocyclo found functions with cyclomatic complexity > 15:"
            echo "$out"
            exit 1
          fi

  web-build:
    name: Build Dashboard SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build SPA
        working-directory: web
        run: npm run build

      - name: Upload dashboard assets
        uses: actions/upload-artifact@v5
        with:
          name: dashboard-assets
          path: internal/dashboard/static/
          retention-days: 1

  test:
    name: Unit Tests
    needs: [lint, web-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - name: Download dashboard assets
        uses: actions/download-artifact@v5
        with:
          name: dashboard-assets
          path: internal/dashboard/static/

      - name: Run unit tests
        run: go test ./... -race -count=1

  e2e:
    name: E2E Tests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - name: Download dashboard assets
        uses: actions/download-artifact@v5
        with:
          name: dashboard-assets
          path: internal/dashboard/static/

      - name: Run E2E tests
        run: go test -tags e2e ./test/e2e/ -timeout 180s -count=1

  docker:
    name: Docker Build
    needs: [e2e, web-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
